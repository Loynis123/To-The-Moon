# Render Blueprint — single Node web service that serves both the built Vue SPA
# and the Express API from one origin. Data is stored in Turso (cloud libSQL),
# so no persistent disk (and no paid plan) is required.
#
# Before deploying, create a free Turso database (no card needed):
#   1. https://turso.tech  → sign up with GitHub
#   2. turso db create cyber-store
#   3. turso db show cyber-store --url           # -> DATABASE_URL
#   4. turso db tokens create cyber-store        # -> DATABASE_AUTH_TOKEN
# Then set those two values on the service below (they are sync:false, so Render
# will prompt for them in the dashboard on first deploy).
services:
  - type: web
    name: cyber-store
    runtime: node
    plan: free
    region: frankfurt # change to your nearest region (e.g. oregon, singapore)
    # --include=dev forces Vite/devDependencies to install even though
    # NODE_ENV=production is set on the service (otherwise `vite build` -> exit 127).
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render generates a strong random value once
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false # set in the dashboard: libsql://<db>-<org>.turso.io
      - key: DATABASE_AUTH_TOKEN
        sync: false # set in the dashboard: token from `turso db tokens create`
